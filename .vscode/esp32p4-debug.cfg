# Disable FreeRTOS task enumeration. With it on, OpenOCD reads FreeRTOS
# internals on every halt, triggering "Unexpected read of fp via program buffer"
# errors that hang the GDB session after a user breakpoint is hit.
set ESP_RTOS none

source [find board/esp32p4-builtin.cfg]

# gdb_memory_map disable was previously needed because the WDT reset the chip
# before flash probe completed. With INT_WDT and TASK_WDT disabled in firmware
# the probe succeeds, so the memory map is now provided to GDB. Without it GDB
# cannot distinguish flash from RAM and silently fails when trying to resume
# from a permanent hardware breakpoint.
